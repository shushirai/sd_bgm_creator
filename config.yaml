      description: "夜の勉強・読書用：ピアノ主体のゆったり集中BGM"
      prompt: >
        gentle solo piano ambient music for late-night studying and reading,
        slow arpeggios and sustained chords on a warm felt piano,
        sparse minimal arrangement with piano as the sole instrument,
        subtle room reverb creating intimate space,
        58-66 bpm, rubato feel, unhurried phrasing,
        soft sustain pedal resonance,
        occasional gentle silence between phrases,
        no drums, no percussion, no bass, no synths,
        no vocals, no lead melody hooks,
        no bright highs, no sharp transients, no abrupt changes,
        ultra smooth and seamless for long listening,
        warm analog character with faint tape hiss,
        calm, meditative, soothing, emotionally tender,
        perfect for deep focus, night study, quiet reading, contemplation,
        non-distracting, continuous, peaceful atmosphere

    deep_work_flow:
      description: "読書・勉強・仕事の作業用：集中を維持する穏やかなローファイ"
      prompt: >
        smooth lo-fi ambient background music for deep work and long study sessions,
        72-76 bpm steady and predictable rhythm,
        warm felt piano with gentle chord progressions,
        soft rhodes pads slowly evolving in the background,
        light brushed hi-hats and subtle rim clicks,
        warm sub bass with gentle sidechain breathing,
        soft vinyl crackle and tape hiss for analog warmth,
        wide stereo reverb creating spacious room feel,
        no vocals, no lead melody, no hooks, no drops,
        no bright highs, no sharp transients, no sudden changes,
        seamless looping structure with no noticeable repeats,
        consistent energy level throughout without builds or breakdowns,
        calm, focused, unobtrusive, steady concentration atmosphere,
        designed for reading, studying, coding, writing, office work,
        non-distracting background that enhances flow state,
        warm analog lo-fi texture, minimal and functional

    night_drive_lofi:
      description: "夜の高速道路×暖色Lo-fi：勉強・読書・仕事向け"
      prompt: >
        Atmospheric Japanese night drive lofi.

        Smooth electric piano, warm ambient synth pads,
